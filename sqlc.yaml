version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/infrastructure/postgres/queries"
    gen:
      go:
        package: "db"
        out: "internal/infrastructure/postgres/db"
        sql_package: "pgx/v5"
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        emit_methods_with_db_argument: true
