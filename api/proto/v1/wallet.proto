syntax = "proto3";

package wallet.v1;

option go_package = "github.com/adamaso/wallet-service/gen/proto/v1;walletv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// WalletService exposes wallet management over gRPC.
// Commands mutate state via the write-side (event store).
// Queries read from the wallet_views projection — no event replay.
service WalletService {
  // Commands
  rpc CreateWallet(CreateWalletRequest)   returns (CreateWalletResponse);
  rpc Deposit     (DepositRequest)        returns (google.protobuf.Empty);
  rpc Withdraw    (WithdrawRequest)       returns (google.protobuf.Empty);
  rpc Transfer    (TransferRequest)       returns (google.protobuf.Empty);
  rpc FreezeWallet(FreezeWalletRequest)   returns (google.protobuf.Empty);

  // Queries
  rpc GetWallet          (GetWalletRequest)           returns (WalletResponse);
  rpc ListWalletsByOwner (ListWalletsByOwnerRequest)  returns (ListWalletsByOwnerResponse);
}

// ── Requests ────────────────────────────────────────────────────────────────

message CreateWalletRequest {
  string owner_id         = 1;
  string currency         = 2;
  double initial_balance  = 3;
}

message DepositRequest {
  string wallet_id  = 1;
  double amount     = 2;
  string reference  = 3;
}

message WithdrawRequest {
  string wallet_id  = 1;
  double amount     = 2;
  string reference  = 3;
}

message TransferRequest {
  string source_wallet_id       = 1;
  string destination_wallet_id  = 2;
  double amount                 = 3;
  string reference              = 4;
}

message FreezeWalletRequest {
  string wallet_id  = 1;
  string reference  = 2;
}

message GetWalletRequest {
  string wallet_id = 1;
}

message ListWalletsByOwnerRequest {
  string owner_id = 1;
}

// ── Responses ───────────────────────────────────────────────────────────────

message CreateWalletResponse {
  string wallet_id = 1;
}

message WalletResponse {
  string                     wallet_id   = 1;
  string                     owner_id    = 2;
  double                     balance     = 3;
  string                     currency    = 4;
  string                     status      = 5;
  google.protobuf.Timestamp  created_at  = 6;
  google.protobuf.Timestamp  updated_at  = 7;
}

message ListWalletsByOwnerResponse {
  repeated WalletResponse wallets = 1;
}
